name: test tree-sitter-stan
on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - "*"

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [macos-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: tree-sitter/setup-action/cli@v2
      - uses: tree-sitter/parser-test-action@v3
        with:
          abi-version: 14
          test-rust: true
          test-python: true
          test-go: true
          go-version: "1.23"
          test-swift: true
      - uses: actions/setup-node@v6
      - run: npm install
      - run: npm test
